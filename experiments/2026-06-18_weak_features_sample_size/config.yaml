# experiments/2026-06-18_weak_features_sample_size/config.yaml
# ──────────────────────────────────────────────────
# Shared settings for the "100 weak features × sample size" experiment.
# Only the train size is swept (see run_experiment.py); everything else
# is fixed here so the comparison across models is clean.

experiment:
  name: weak_features_sample_size
  description: >
    Compare CatBoost, HistGradientBoosting, and interpretable rule/tree
    models (FIGS, GreedyRuleList, plain DecisionTree) when the feature
    set is wide but weak (100 features, each with information 0.10).
    The sweep varies the training size against a large OOS test set.

# ── Sweep axis ────────────────────────────────────────────────────────────
sweep:
  trial_name: n_train
  values: [200, 500, 1000, 2000, 5000, 10000]

# ── Data budget ───────────────────────────────────────────────────────────
# n_test is large so OOS metric estimates are essentially noise-free.
# n_repeats gives independent test draws per (model, n_train).
data:
  n_test: 50000
  n_repeats: 30
  n_valid: 1000            # not used for fitting; reserved for consistency
  seeds:
    train: 101
    valid: 202
    test_base: 10000

# ── DGP ───────────────────────────────────────────────────────────────────
# 100 features, each with separation 0.10 (weak).
# Individually uninformative, but the Bayes-optimal linear separator
# aggregates them into a strong signal.
dgp:
  p_pos: 0.20
  sigma: 1.0
  n_features: 100
  info_per_feature: 0.10

# ── Models ────────────────────────────────────────────────────────────────
# Each setup sees the same 100 features; only the model differs.
# `logistic` is the (near-)Bayes reference: the DGP is linear in the features.
models:
  logistic:
    label: "LogisticRegression"
    factory: make_logistic

  catboost:
    label: "CatBoost"
    factory: make_catboost
    params:
      iterations: 400
      depth: 4
      learning_rate: 0.05

  hgb:
    label: "HistGradientBoosting"
    factory: make_hgb
    params:
      iterations: 400
      learning_rate: 0.05
      max_leaf_nodes: 16

  decision_tree:
    label: "DecisionTree (depth=4)"
    factory: make_decision_tree
    params:
      max_depth: 4
      min_samples_leaf: 20

  figs:
    label: "FIGS (max_rules=25)"
    factory: make_figs
    params:
      max_rules: 25

  greedy:
    label: "GreedyRuleList (depth=8)"
    factory: make_greedy_rule_list
    params:
      max_depth: 8

# ── Metrics ───────────────────────────────────────────────────────────────
metrics:
  - roc_auc
  - average_precision
  - brier_score

# ── Reference model used as the "best case" line in learning curves ──────
reference_setup: logistic

# ── Comparator setup used in the gap plot ─────────────────────────────────
gap_baseline: catboost

outputs:
  dir: outputs
