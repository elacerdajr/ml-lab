# experiments/roc_vs_ap/study_feature_info.yaml
# ────────────────────────────────────────────────
# Study 2 — Effect of feature information level.
#
# Positive fraction is fixed; the signal strength of both features
# is scaled together via `info_scale_values`.
#
# info_j(scale) = config.dgp.info[j] * scale
# x2 is always weaker than x1 (their ratio is preserved from config.yaml).

study:
  name: feature_info
  label: "Feature Information"
  condition_col: info_scale
  xlabel: "Info Scale  (multiplied on base separation)"

  # Fixed positive fraction for this study
  fixed_p_pos: 0.10

  # Grid of info-scale factors to sweep
  info_scale_values: [0.10, 0.30, 0.50, 0.80, 1.20, 1.80]
